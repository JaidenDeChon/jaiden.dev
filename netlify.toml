[build]
  command = "bun run build && node scripts/prepare-netlify-function-deps.mjs"

[build.environment]
  BUN_VERSION = "1.3.11"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["better-sqlite3"]
  included_files = ["node_modules/better-sqlite3/build/Release/better_sqlite3.node"]